spring.application.name=pulsoetico

# ---- Banco de dados (PostgreSQL) ----
# Ajuste host/porta/nome do banco/usuario/senha conforme seu ambiente.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA / Hibernate ----
# "update" e otimo para o hack (cria/atualiza as tabelas automaticamente a partir das entidades).
# Trocar para "validate" se um dia isso for para producao de verdade.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ---- Swagger / OpenAPI ----
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha

# ---- JWT ----
# O segredo vem de variavel de ambiente em producao. O valor apos ":" e so
# fallback para rodar local rapido no hack - troque/gere um novo se for expor publicamente.
jwt.secret=${JWT_SECRET}
# 8 horas em milissegundos - da pra cobrir um turno de trabalho inteiro sem precisar logar de novo
jwt.expiration-ms=28800000

# ---- Servidor ----
server.port=${PORT:8080}
server.address=0.0.0.0


logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.pulsoetico=TRACE

brevo.api-key=${BREVO_API_KEY}
brevo.sender-email=caioca827@gmail.com
brevo.sender-name=PulsoEtico